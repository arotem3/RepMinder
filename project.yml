name: RepMinder
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  RepMinder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RepMinder
        excludes:
          - "Info.plist"
          - "RepMinder.entitlements"
    settings:
      base:
        SWIFT_VERSION: "5.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.RepMinder
        INFOPLIST_FILE: RepMinder/Info.plist
        CODE_SIGN_ENTITLEMENTS: RepMinder/RepMinder.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: RepMinder/Info.plist
      properties:
        CFBundleDisplayName: RepMinder
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Used to read your Wi-Fi network name so reminders can adjust when you are home."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
